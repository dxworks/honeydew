name: Trivy Security Scan

on:
  pull_request:
    branches: [master]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  trivy-fs:
    uses: dxworks/pipelines/.github/workflows/trivy-fs-scan.yml@v1

  trivy-image:
    uses: dxworks/pipelines/.github/workflows/trivy-image-scan.yml@v1
    with:
      # Honeydew ships a self-contained multi-stage Dockerfile that builds the
      # whole .NET solution inside the image, so no build-setup / java-version
      # pre-build step is needed (unlike the JVM plugins).
      image-ref: honeydew:${{ github.sha }}
      build-context: .
      # Report-only: the image is scanned and results are uploaded to the
      # Security tab and posted as a PR comment, but findings don't block the
      # PR. The mcr.microsoft.com/dotnet/sdk base image carries unfixable
      # MEDIUM OS-package CVEs (38 MEDIUM, 0 HIGH/CRITICAL), and the v1 image
      # scan evaluates its gate over all severities. The filesystem scan above
      # stays a hard gate on our own code and dependencies.
      fail-on-findings: false
      post-pr-comment: true
